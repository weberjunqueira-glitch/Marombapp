  <!-- Service Worker registration (uses external sw.js for full offline support) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    /* Light theme (default) — soft natural background */
    html.theme-light { background: #f5faf7; }
    html.theme-light body { background: #f5faf7; color: #1a3a2a; }
    /* Dark theme — uses CSS filter to invert luminance globally while preserving hue.
       This is the same technique used by browser dark-mode extensions like Dark Reader.
       Works with all inline styles without needing to refactor every component. */
    html.theme-dark { background: #0f1419; }
    html.theme-dark body { background: #ffffff; }
    html.theme-dark #root {
      filter: invert(0.93) hue-rotate(180deg);
      min-height: 100vh;
    }
    /* Revert filter on visual media so emojis/images keep correct colors */
    html.theme-dark img,
    html.theme-dark video,
    html.theme-dark iframe {
      filter: invert(1) hue-rotate(180deg);
    }
    /* Ensure modals/overlays inside #root also get inverted properly */
    html.theme-dark { color-scheme: dark; }

    body { font-family: Georgia, serif; overflow-x: hidden; }
    #root { min-height: 100vh; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f0faf5; }
    ::-webkit-scrollbar-thumb { background: #10b98160; border-radius: 4px; }
    html.theme-dark ::-webkit-scrollbar-track { background: #1a2632; }
    /* Safe areas for notch phones */
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    /* Install banner */
    #install-banner {
      display: none; position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg,#10b981,#059669); color: #fff;
      border-radius: 14px; padding: 14px 22px; font-size: 14px; font-weight: 700;
      z-index: 9999; box-shadow: 0 8px 32px rgba(16,185,129,0.4);
      cursor: pointer; max-width: 340px; width: calc(100% - 32px);
      text-align: center; line-height: 1.4;
    }
    #install-banner.show { display: block; animation: slideUp2 .4s ease; }
    @keyframes slideUp2 { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  </style>

  <!-- Apply saved theme BEFORE React mounts to avoid white flash on load -->
  <script>
    (function() {
      try {
        var saved = localStorage.getItem("fitplanner_theme_v1");
        var theme = saved || "light";

// Auto-rotate: each day gets option index based on day number (cycling 0,1,2)
// Days 1,4,7,10,13,16,19,22,25,28 → idx 0
// Days 2,5,8,11,14,17,20,23,26,29 → idx 1
// Days 3,6,9,12,15,18,21,24,27,30 → idx 2
const getDefaultOption = (day) => (day - 1) % 3;

// Build 30-day dataset using the pool (cycling all 9 options across 30 days)

// ─── Budget cost caps per meal (R$ per serving) ─────────────────────────────
const BUDGET_MEAL_CAP = {
  low:    { breakfast:6,  snack_am:4,  lunch:14, snack_pm:5,  dinner:16, supper:5  },
  medium: { breakfast:12, snack_am:9,  lunch:25, snack_pm:10, dinner:28, supper:9  },
  high:   { breakfast:18, snack_am:14, lunch:40, snack_pm:16, dinner:40, supper:14 },
  premium:{ breakfast:99, snack_am:99, lunch:99, snack_pm:99, dinner:99, supper:99 },
};

// Global profile reference — set by Planner, read by getOptions scoring
let _profile = null;
function setGlobalProfile(p) { _profile = p; }

// Score a recipe against user profile (higher = better match)
function scoreRecipe(recipe, mealType) {
  if (!_profile) return 0;
  let score = 0;

  // Budget filter: heavily penalize if over budget
  const cap = BUDGET_MEAL_CAP[_profile.budget || "medium"][mealType] || 99;
  if (recipe.cost > cap * 1.3) score -= 100;
  else if (recipe.cost <= cap) score += 10;

  // Likes: boost if recipe name/ingredients contain liked food
  const rText = (recipe.name + " " + (recipe.ingredients||[]).join(" ")).toLowerCase();
  (_profile.likes || []).forEach(id => {
    (FOOD_TAG_MAP[id] || []).forEach(tag => { if (rText.includes(tag)) score += 15; });
  });

  // Dislikes: penalize if recipe contains disliked food
  (_profile.dislikes || []).forEach(id => {
    (FOOD_TAG_MAP[id] || []).forEach(tag => { if (rText.includes(tag)) score -= 20; });
  });

  return score;
}

const MEALS_DB = Array.from({ length: 30 }, (_, di) => {
  const d = di + 1;
  const base = (di % 9); // 0-8 rotation through full pool
  const next = (di + 3) % 9;
  const prev = (di + 6) % 9;
  return {
    day: d,
    defaultOpts: { // pre-computed defaults per meal type
      breakfast: getDefaultOption(d),
      snack_am:  getDefaultOption(d),
      lunch:     getDefaultOption(d),
      snack_pm:  getDefaultOption(d),
      dinner:    getDefaultOption(d),
      supper:    getDefaultOption(d),
    },
    // Each day has 3 options drawn from the pool at different offsets
    getOptions: (type) => {
      const pool = POOL[type];
      // Build 3 candidate indices (distinct)
      const idxSet = new Set();
      let i = base;
      while (idxSet.size < Math.min(3, pool.length)) {
        idxSet.add(i % pool.length);
        i++;
      }
      const candidates = [...idxSet].map(idx => pool[idx]);
      // Sort by profile score (best matches first)
      return candidates
        .map(r => ({ r, s: scoreRecipe(r, type) }))
        .sort((a,b) => b.s - a.s)
        .map(x => x.r);
    },
  };
});


// ─── Hydration calculator ─────────────────────────────────────────────────
// Formula: 35ml per kg body weight + 500ml if active + 300ml if hot climate
function calcWaterLiters(profile) {
  const base = (profile.weight || 80) * 35;                  // ml
  const actBonus = ["moderate","intense","athlete"].includes(profile.activityLevel||"moderate") ? 500 : 200;
  return ((base + actBonus) / 1000).toFixed(1);
}

// MET values per workout type × intensity
// Calorie burn = MET × weight(kg) × duration(h)
const MET_TABLE = {
  //          low   medium  high
  rest:     [ 1.0,   1.0,   1.0 ],
  cardio:   [ 5.0,   7.5,  10.0 ],
  strength: [ 3.5,   5.0,   6.5 ],
  hiit:     [ 7.0,   9.5,  13.0 ],
  yoga:     [ 2.0,   3.0,   4.0 ],
  swim:     [ 5.5,   7.0,   9.5 ],
  bike:     [ 5.0,   8.0,  12.0 ],
  walk:     [ 3.0,   4.0,   5.0 ],
  sports:   [ 4.5,   6.5,   9.0 ],
  stretch:  [ 2.5,   3.0,   3.5 ],
  custom:   [ 4.0,   6.0,   8.0 ],
};
const INTENSITY_IDX = { low:0, medium:1, high:2 };

function calcBurnedCalories(workout, weightKg) {
  if (!workout || workout.type === "rest" || !workout.duration) return 0;
  const met   = (MET_TABLE[workout.type] || MET_TABLE.custom)[INTENSITY_IDX[workout.intensity||"medium"]];
  const hours = Number(workout.duration) / 60;
  return Math.round(met * weightKg * hours);
}

// Multi-workout helpers: workouts[day] can be either an array of workouts or
// a single workout object (legacy format). These helpers always return an array.
function getWorkoutsForDay(workoutsObj, day) {
  const w = workoutsObj[day];
  if (!w) return [];
  if (Array.isArray(w)) return w.filter(Boolean);
  return [w]; // legacy single-object format
}

function totalBurnedForDay(workoutsObj, day, weightKg) {
  return getWorkoutsForDay(workoutsObj, day)
    .reduce((s, w) => s + calcBurnedCalories(w, weightKg), 0);
}

function totalDurationForDay(workoutsObj, day) {
  return getWorkoutsForDay(workoutsObj, day)
    .filter(w => w.type !== "rest")
    .reduce((s, w) => s + (Number(w.duration) || 0), 0);
}

// Returns the "primary" workout for display purposes (first non-rest, or first)
function getPrimaryWorkout(workoutsObj, day) {
  const arr = getWorkoutsForDay(workoutsObj, day);
  if (arr.length === 0) return null;
  return arr.find(w => w.type !== "rest") || arr[0];
}

// ─── Schedule calculator ────────────────────────────────────────────────────
function calcSchedule(wakeH, wakeM, sleepH, sleepM) {
  const toMin = (h, m) => h * 60 + m;
  const fmt = (totalMin) => {
    const h = Math.floor(((totalMin % 1440) + 1440) % 1440 / 60);
    const m = ((totalMin % 1440) + 1440) % 1440 % 60;
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  };
  const wake  = toMin(wakeH, wakeM);
  const sleep = sleepH < wakeH ? toMin(sleepH, sleepM) + 1440 : toMin(sleepH, sleepM);
  const awake = sleep - wake;
  return {
    breakfast: fmt(wake + 20),
    snack_am:  fmt(wake + Math.round(awake * 0.18)),
    lunch:     fmt(wake + Math.round(awake * 0.35)),
    snack_pm:  fmt(wake + Math.round(awake * 0.55)),
    dinner:    fmt(wake + Math.round(awake * 0.72)),
    supper:    fmt(sleep - 55),
  };
}

// ─── Date helpers ───────────────────────────────────────────────────────────
function getDietDate(startDateStr, dayNumber) {
  // Returns the real date for a given plan day (1-based)
  if (!startDateStr) return null;
  try {
    const d = new Date(startDateStr + "T00:00:00");
    d.setDate(d.getDate() + dayNumber - 1);
    return d;
  } catch { return null; }
}

function formatDate(date) {
  if (!date) return "";
  return date.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit" });
}

function getPlanDayForToday(startDateStr) {
  // Returns which plan day number corresponds to today (1-30), or null
  if (!startDateStr) return null;
  try {
    const start  = new Date(startDateStr + "T00:00:00");
    const today  = new Date();
    today.setHours(0,0,0,0);
    start.setHours(0,0,0,0);
    const diff   = Math.round((today - start) / 86400000);
    if (diff < 0 || diff >= 30) return null;
    return diff + 1; // 1-based
  } catch { return null; }
}

// ─── Macro calculator ───────────────────────────────────────────────────────
function calcMacros(profile, meal, mealType) {
  const { weight, height, age, sex, goal } = profile;
  const tmb = sex === "M"
    ? 88.36 + 13.4 * weight + 4.8 * height - 5.7 * age
    : 447.6 + 9.25 * weight + 3.1 * height - 4.3 * age;
  const tdee = tmb * 1.55;
  const defMap = { lose_fast:650, lose:450, maintain:0, gain:350 };
  const tKcal = tdee - (defMap[goal] || 450);
  const split = { breakfast:0.20, snack_am:0.08, lunch:0.28, snack_pm:0.10, dinner:0.24, supper:0.10 };
  const mKcal = Math.round(tKcal * (split[mealType] || 0.2));
  const tgW   = goal === "gain" ? weight + 10 : goal === "maintain" ? weight : weight * 0.9;
  const prot  = Math.round(1.8 * tgW * (split[mealType] || 0.2) * (meal.pMult || 1));
  const carbs = Math.round((mKcal * 0.30 / 4) * (meal.cMult || 1));
  const fat   = Math.round((mKcal * 0.25 / 9) * (meal.fMult || 1));
  const kcal  = prot * 4 + carbs * 4 + fat * 9;
  return { protein: prot, carbs, fat, kcal };
}


// ─── Calorie Engine ──────────────────────────────────────────────────────────
// Returns full daily calorie profile for a given profile + day selections
// doneMealsMap: only count calories for meals the user marked as done

function calcDailyCalorieProfile(profile, day, optIdxMap, workoutsMap, doneMealsMap = {}) {
  const { weight, height, age, sex, goal } = profile;

  // 1. Basal Metabolic Rate (Harris-Benedict)
  const tmb = sex === "M"
    ? 88.36 + 13.4 * weight + 4.8 * height - 5.7 * age
    : 447.6 + 9.25 * weight + 3.1 * height - 4.3 * age;

  // 2. TDEE with activity multiplier
  const actMult = { sedentary:1.2, light:1.375, moderate:1.55, intense:1.725, athlete:1.9 };
  const tdee = tmb * (actMult[profile.activityLevel || "moderate"]);

  // 3. Diet target (with calorie deficit/surplus from goal)
  const defMap = { lose_fast:650, lose:450, maintain:0, gain:350 };
  const dietDeficit = defMap[goal] || 450;
  const dietTarget  = Math.round(tdee - dietDeficit);

  // 4. Calories consumed — ONLY from meals marked as done
  const d = MEALS_DB.find(x => x.day === day);
  let consumed = 0;
  let mealsTracked = 0; // how many meals were marked done
  if (d) {
    MEAL_TYPES.forEach(mt => {
      const mealDoneKey = `${day}-${mt.key}`;
      // Only count if this meal was marked done
      if (!doneMealsMap[mealDoneKey]) return;
      const opts   = d.getOptions(mt.key);
      const optKey = `${day}-${mt.key}`;
      const idx    = optIdxMap[optKey] ?? getDefaultOption(day);
      const meal   = opts[idx];
      if (meal) {
        const mac = calcMacros(profile, meal, mt.key);
        consumed += mac.kcal;
        mealsTracked++;
      }
    });
  }

  // 5. Calories burned from workout(s) — sum of ALL workouts registered for this day
  const burned  = totalBurnedForDay(workoutsMap, day, weight);

  // 6. Net deficit/surplus for this day
  const totalExpenditure = Math.round(tdee + burned);
  const netBalance       = consumed - totalExpenditure;

  return {
    tmb:      Math.round(tmb),
    tdee:     Math.round(tdee),
    dietTarget,
    consumed,
    mealsTracked,     // number of meals marked done
    burned,
    totalExpenditure,
    netBalance,
    dietDeficit,
    totalDeficit: Math.round(-netBalance),
  };
}

// Monthly summary for done days
function calcMonthlySummary(profile, doneDays, optIdxMap, workoutsMap, doneMealsMap = {}) {
  if (!doneDays || doneDays.length === 0) return null;

  let totalConsumed     = 0;
  let totalBurned       = 0;
  let totalExpenditure  = 0;
  let totalNetDeficit   = 0;
  let daysWithWorkout   = 0;
  let totalWorkoutMins  = 0;

  doneDays.forEach(day => {
    try {
      const dp = calcDailyCalorieProfile(profile, day, optIdxMap, workoutsMap, doneMealsMap || {});
      // Accumulate regardless — use TDEE as expenditure floor
      const expend = Math.max(dp.totalExpenditure, dp.tdee || 0);
      totalExpenditure += expend;
      totalBurned      += (dp.burned || 0);
      if (dp.mealsTracked > 0) {
        totalConsumed   += (dp.consumed || 0);
        totalNetDeficit += Math.max(0, expend - (dp.consumed || 0));
      } else {
        // No meals tracked → assume full TDEE deficit (ideal scenario)
        totalNetDeficit += dp.tdee || 0;
      }
      // Count workouts: a day has-workout if it has any non-rest workout with duration
      const dayWorkouts = getWorkoutsForDay(workoutsMap, day);
      const activeWorkouts = dayWorkouts.filter(w => w.type !== "rest" && w.duration);
      if (activeWorkouts.length > 0) {
        daysWithWorkout++;
        totalWorkoutMins += activeWorkouts.reduce((s, w) => s + (Number(w.duration) || 0), 0);
      }
    } catch(e) { /* skip days with errors */ }
  });

  // Estimated weight loss: 7700 kcal deficit ≈ 1kg fat
  const estimatedLossKg = (totalNetDeficit / 7700).toFixed(2);

  return {
    days:             doneDays.length,
    totalConsumed:    Math.round(totalConsumed),
    totalBurned:      Math.round(totalBurned),
    totalExpenditure: Math.round(totalExpenditure),
    totalNetDeficit:  Math.round(totalNetDeficit),
    estimatedLossKg,
    daysWithWorkout,
    totalWorkoutMins,
    avgConsumedPerDay:Math.round(totalConsumed / doneDays.length),
    avgBurnedPerDay:  Math.round(totalBurned / doneDays.length),
  };
}

// ─── Image ──────────────────────────────────────────────────────────────────
function Img({ src, alt, style }) {
  const [ok, setOk]  = useState(false);
  const [err, setErr] = useState(false);
  return (
    <div style={{ background:"#0a1520", ...style, overflow:"hidden", position:"relative" }}>
      {!ok && !err && <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}><div style={{ width:20, height:20, border:"3px solid #10b98130", borderTopColor:"#10b981", borderRadius:"50%", animation:"spin .8s linear infinite" }} /></div>}
      {!err
        ? <img src={src} alt={alt} onLoad={() => setOk(true)} onError={() => setErr(true)} style={{ width:"100%", height:"100%", objectFit:"cover", display: ok?"block":"none" }} />
        : <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30 }}>{alt}</div>}
    </div>
  );
}

// Lookup: first match wins
function toNoun(raw) {
  const s = raw.toLowerCase()
    .replace(/\(.*?\)/g, "")
    .replace(/\s+/g, " ")
    .trim();
  for (const [frag, noun] of NOUN_MAP) {
    if (s.includes(frag)) return noun;
  }
  // fallback: drop common adjectives and return
  return s
    .replace(/\b(integral|branco|marrom|cru|cozido|assado|grelhado|desfiado|fatiado|picado|ralado|maduro|fresco|natural|light|magro|defumado|extravirgem|em pó|em flocos|em cubos|laminado|grosso|seco|fresca|inteiro|opcional|a gosto)\b/gi, "")
    .replace(/,.*$/, "")
    .replace(/\s+/g, " ")
    .trim();
}

                          <div style={{ position:"absolute", top:2, left: isOn?22:2, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,.2)" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div>
                <label style={lbl}>ALARME DE HIDRATAÇÃO</label>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {[
                    { key:"alarm_water_enable", label:"Lembrete de água", sub:"Receber notificação a cada hora" },
                    { key:"alarm_water_morning", label:"Alerta matinal", sub:"Lembrar de tomar água ao acordar" },
                  ].map(al => {
                    const isOn = form[al.key] === true;
                    return (
                      <div key={al.key} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 12px", border:`1px solid ${isOn?"#3b82f640":"#c8e6d8"}`, borderRadius:10, background: isOn?"#eff6ff":"#fafffe" }}>
                        <span style={{ fontSize:16 }}>💧</span>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:12, fontWeight:600, color:"#1a3a2a" }}>{al.label}</div>
                          <div style={{ fontSize:10, color:"#7aaa90" }}>{al.sub}</div>
                        </div>
                        <div onClick={() => {
                        if (!isOn && "Notification" in window && Notification.permission !== "granted") {
                          const req = Notification.requestPermission();
                          if (req && typeof req.then === "function") req.then(() => {});
                          else Notification.requestPermission(() => {});
                        }
                        set(al.key, !isOn);
                      }}
                          style={{ width:44, height:24, borderRadius:12, background: isOn?"#3b82f6":"#c8e6d8", cursor:"pointer", position:"relative", transition:"background .2s" }}>
                          <div style={{ position:"absolute", top:2, left: isOn?22:2, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,.2)" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <button onClick={() => {
                const requestAndNotify = (perm) => {
                  if (perm === "granted") {
                    try {
                      new Notification("FitPlanner 🥗", {
                        body: "✅ Notificações ativadas! Você receberá lembretes de refeições e hidratação.",
                        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>",
                        tag: "fitplanner-test",
                        requireInteraction: false,
                      });
                    } catch(e) { alert("Notificação enviada! Se não apareceu, verifique as permissões do navegador/sistema."); }
                  } else if (perm === "denied") {
                    alert("❌ Notificações bloqueadas!\n\nPara ativar:\nAndroid Chrome → Config. do site → Notificações → Permitir\niOS Safari → Config. → Safari → [seu site] → Notificações");
                  } else {
                    alert("⚠️ Permissão não concedida. Tente novamente e clique em 'Permitir'.");
                  }
                };
                if (!("Notification" in window)) {
                  alert("Este navegador não suporta notificações. Use o Chrome ou Safari.");
                } else if (Notification.permission === "granted") {
                  requestAndNotify("granted");
                } else {
                  const result = Notification.requestPermission();
                  if (result && typeof result.then === "function") {
                    result.then(requestAndNotify);
                  } else {
                    // Old callback style
                    Notification.requestPermission(requestAndNotify);
                  }
                }
              }} style={{ padding:"11px", border:"1.5px solid #fbbf24", borderRadius:11, background:"#fef3c7", color:"#92400e", fontSize:12, fontWeight:700, cursor:"pointer", width:"100%" }}>
                🔔 Testar notificação agora
              </button>

              {/* Notification status indicator */}
              <div style={{ marginTop:8, padding:"8px 12px", borderRadius:9, background: typeof Notification !== "undefined" && Notification.permission === "granted" ? "#e8f5ef" : "#fef2f2", border:`1px solid ${typeof Notification !== "undefined" && Notification.permission === "granted" ? "#10b98140" : "#fca5a540"}` }}>
                <span style={{ fontSize:11, color: typeof Notification !== "undefined" && Notification.permission === "granted" ? "#059669" : "#dc2626" }}>
                  {typeof Notification === "undefined" ? "🚫 Não suportado neste navegador" : Notification.permission === "granted" ? "✅ Notificações permitidas" : Notification.permission === "denied" ? "❌ Notificações bloqueadas — ative nas configurações do dispositivo" : "⚠️ Permissão pendente — toque no botão acima"}
                </span>
              </div>
            </div>
          )}

        </div>

        {/* Footer */}
        <div style={{ padding:"14px 20px", borderTop:"1.5px solid #c8e6d8", display:"flex", gap:10 }}>
          <button onClick={onClose}
            style={{ flex:1, padding:"11px", border:"1.5px solid #c8e6d8", borderRadius:11, background:"#f0faf5", color:"#4a6a5a", fontSize:13, cursor:"pointer" }}>
            Cancelar
          </button>
          <button onClick={handleSave}
            style={{ flex:2, padding:"11px", border:"none", borderRadius:11, background:"linear-gradient(135deg,#10b981,#059669)", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
            💾 Salvar alterações
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Alexa Modal ─────────────────────────────────────────────────────────────
function AlexaModal({ getMealsFn, initialPeriod, onClose }) {
  const [period,  setPeriod]    = useState(initialPeriod ?? null);
  const [filter,  setFilter]    = useState("");
  const [checkedItems, setCheckedItems] = useState(() => {
    try { return JSON.parse(localStorage.getItem("fitplanner_cart_v1") || "[]"); } catch { return []; }
  });

  const saveChecked = (items) => {
    setCheckedItems(items);
    try { localStorage.setItem("fitplanner_cart_v1", JSON.stringify(items)); } catch {}
  };

  const items = useMemo(() => {
    if (!period) return [];
    const days = MEALS_DB.slice(0, period);
    return buildShoppingList(days, getMealsFn);
  }, [period, getMealsFn]);

  const filtered = filter
    ? items.filter(i => i.name.includes(filter.toLowerCase()))
    : items;

  // Alexa format: one item per line — "200 g de frango" etc.
  const alexaText = filtered.map(i => i.line).join("\n");

  const [copyStatus, setCopyStatus] = useState(null); // null | "ok" | "fail"

  const copy = () => {
    const onSuccess = () => {
      setCopyStatus("ok");
      setTimeout(() => setCopyStatus(null), 3500);
    };
    const onFail = () => {
      // Last resort: show the text in a prompt so user can copy manually
      setCopyStatus("fail");
      setTimeout(() => setCopyStatus(null), 6000);
    };
    const doFallback = () => {
      try {
        const ta = document.createElement("textarea");
        ta.value = alexaText;
        ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if (ok) onSuccess(); else onFail();
      } catch { onFail(); }
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(alexaText).then(onSuccess).catch(doFallback);
    } else {
      doFallback();
    }
  };

  // Open Alexa app deep-link — tries app first, falls back to web
  const openAlexa = () => {
    // First copy to clipboard so user can paste
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(alexaText).catch(() => {});
    }
    // Try Alexa app deep link (Android/iOS)
    const appLink = "alexa://lists/add?name=FitPlanner&items=" + encodeURIComponent(alexaText);
    const webLink = "https://alexa.amazon.com/spa/index.html#lists/create?name=FitPlanner";
    // Try app link first
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    document.body.appendChild(iframe);
    try { iframe.src = appLink; } catch {}
    setTimeout(() => {
      document.body.removeChild(iframe);
      // Fall back to web
      window.open(webLink, "_blank");
    }, 1500);
  };

  const totalCost = period
    ? MEALS_DB.slice(0, period).reduce((s, { day }) => {
        const d = MEALS_DB.find(x => x.day === day);
        return s + MEAL_TYPES.reduce((s2, mt) => {
          const opts = d.getOptions(mt.key);
          return s2 + (opts[getMealsFn(day, mt.key)]?.cost || 0);
        }, 0);
      }, 0)
    : 0;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:580, background:"#fff", border:"1px solid rgba(99,102,241,0.4)", borderRadius:26, overflow:"hidden", animation:"fadeUp .3s ease", boxShadow:"0 40px 100px rgba(0,0,0,0.9)", maxHeight:"94vh", display:"flex", flexDirection:"column" }}>

        {/* ── HEADER ── */}
        <div style={{ padding:"22px 24px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:48, height:48, borderRadius:14, background:"linear-gradient(135deg,#1a73e8,#6366f1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>🔵</div>
            <div style={{ flex:1 }}>
              <h3 style={{ margin:0, fontSize:18, fontWeight:800, color:"#1a3a2a" }}>Lista de Compras — Alexa</h3>
              {period
                ? <p style={{ margin:0, fontSize:11, color:"#4b6272", fontFamily:"monospace" }}>{items.length} itens · {period} dias · custo est. R$ {totalCost.toFixed(0)}</p>
                : <p style={{ margin:0, fontSize:11, color:"#4b6272", fontFamily:"monospace" }}>Escolha o período de compras abaixo</p>}
            </div>
            <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#7aaa90", fontSize:22, cursor:"pointer", flexShrink:0 }}>✕</button>
          </div>
        </div>

        {/* ── PERIOD SELECTOR ── */}
        {!period ? (
          <div style={{ padding:"28px 24px", flex:1 }}>
            <p style={{ margin:"0 0 6px", fontSize:11, fontFamily:"monospace", color:"#3a5268", letterSpacing:2 }}>SELECIONE O PERÍODO DE COMPRAS</p>
            <p style={{ margin:"0 0 24px", fontSize:13, color:"#64748b", lineHeight:1.5 }}>As quantidades serão somadas com base nas receitas selecionadas para cada dia, agrupando ingredientes iguais.</p>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>

                    <div style={{ fontSize:11, color:"#4a6a5a" }}>Cole no app Alexa → Listas → Nova Lista, ou dite cada item por voz.</div>
                  </div>
                </div>
              )}
              {copyStatus === "fail" && (
                <div style={{ marginBottom:12, padding:"11px 16px", background:"#fef2f2", border:"1.5px solid #fca5a5", borderRadius:12, display:"flex", alignItems:"flex-start", gap:10, animation:"fadeUp .25s ease" }}>
                  <span style={{ fontSize:22 }}>⚠️</span>
                  <div>
                    <div style={{ fontSize:13, fontWeight:800, color:"#dc2626" }}>Não foi possível copiar automaticamente</div>
                    <div style={{ fontSize:11, color:"#7f1d1d" }}>Selecione todos os itens da lista acima (toque e segure) e copie manualmente.</div>
                  </div>
                </div>
              )}

              <div style={{ display:"flex", gap:9, marginBottom:10 }}>
                <button onClick={copy}
                  style={{ flex:2, padding:"13px", border:"none", borderRadius:11, background: copyStatus==="ok" ? "linear-gradient(135deg,#10b981,#059669)" : copyStatus==="fail" ? "linear-gradient(135deg,#f97316,#ef4444)" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer", transition:"all .3s", display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                  {copyStatus === "ok" ? <>✅ Copiado com sucesso!</> : copyStatus === "fail" ? <>⚠️ Falhou — tentar novamente</> : <>📋 Copiar {filtered.length} itens</>}
                </button>
                <button onClick={openAlexa}
                  style={{ flex:1, padding:"13px", border:"1.5px solid #6366f1", borderRadius:11, background:"#f5f3ff", color:"#6366f1", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  🔵 Abrir Alexa
                </button>
              </div>
              <p style={{ margin:0, fontSize:9, color:"#7aaa90", textAlign:"center", fontFamily:"monospace" }}>
                {period} dias · {filtered.length} ingredientes · quantidades somadas · ref. mai/2026
              </p>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Registration ────────────────────────────────────────────────────────────
function RegisterScreen({ onRegister }) {
  const [form, setForm] = useState({
    name:"", sex:"M", age:"", weight:"", height:"", goalWeight:"",
    goal:"lose", wakeTime:"06:30", sleepTime:"23:00",
    budget:"medium", activityLevel:"moderate",
    likes:[], dislikes:[], dislikesText:"",
    likes_proteins:[], likes_dairy:[], likes_grains:[],
    likes_vegetables:[], likes_fruits:[], likes_fats:[],
    dietStartDate: new Date().toISOString().slice(0,10),
  });
  const [step, setStep]   = useState(0);
  const [errors, setErrors] = useState({});

  // Toggle food in likes or dislikes
  const toggleFood = (key, id) => {
    setForm(f => {
      const arr = f[key];
      const other = key === "likes" ? "dislikes" : "likes";
      return {
        ...f,
        [key]: arr.includes(id) ? arr.filter(x=>x!==id) : [...arr, id],
        [other]: f[other].filter(x=>x!==id), // remove from the other list

  };

  const fields = [

    { key:"sex",        label:"Qual é o seu sexo biológico?",      type:"select", icon:"⚥",
      options:[{v:"M",l:"Masculino 👨"},{v:"F",l:"Feminino 👩"}] },

    { key:"weight",     label:"Qual é o seu peso atual? (kg)",     type:"number", placeholder:"Ex: 125", icon:"⚖️", min:40, max:300 },
    { key:"height",     label:"Qual é a sua altura? (cm)",         type:"number", placeholder:"Ex: 188", icon:"📏", min:140, max:220 },
    { key:"goalWeight", label:"Qual é o seu peso-meta? (kg)",      type:"number", placeholder:"Ex: 100", icon:"🎯", min:40, max:300 },
    { key:"goal",       label:"Qual é o ritmo da sua dieta?",      type:"select", icon:"🚀",
      options:[
        {v:"lose_fast", l:"🔥 Perda acelerada (−650 kcal/dia)"},
        {v:"lose",      l:"⚡ Perda moderada  (−450 kcal/dia)"},
        {v:"maintain",  l:"⚖️ Manutenção de peso"},
        {v:"gain",      l:"💪 Ganho de massa  (+350 kcal/dia)"},
      ]},
    { key:"budget",     label:"Qual é o seu orçamento mensal com alimentação?", type:"select", icon:"💰",
      hint:"Usaremos isso para priorizar receitas dentro da sua faixa de gasto",
      options:[

        {v:"medium", l:"💛 Moderado  — R$ 400 a R$ 800/mês"},
        {v:"high",   l:"🧡 Confortável — R$ 800 a R$ 1.500/mês"},
        {v:"premium",l:"💜 Premium   — acima de R$ 1.500/mês"},
      ]},
    { key:"likes_proteins",   label:"Quais proteínas você prefere?",         type:"foodcat", cat:"proteins",   icon:"🍗",
      hint:"Selecione as proteínas que você mais gosta. Elas aparecerão com mais frequência." },
    { key:"likes_dairy",      label:"Quais laticínios você consome?",          type:"foodcat", cat:"dairy",      icon:"🥛",

  const foodCatItems = cur.type === "foodcat"
    ? (FOOD_CATEGORIES.find(cat => cat.key === cur.cat)?.items || [])
    : FOOD_OPTIONS;

  const validate = () => {
    if (isFoodPick) return null; // food picks are optional
    const v = form[cur.key];
    if (!v || v === "") return "Campo obrigatório";
    if (cur.type === "number") {
      const n = Number(v);
      if (isNaN(n) || n < cur.min || n > cur.max) return `Valor entre ${cur.min} e ${cur.max}`;
    }
    return null;
  };

  const next = () => {
    const err = validate();
    if (err) { setErrors({ [cur.key]: err }); return; }

        likes:    [...new Set(allLikes)],
        dislikes: parsedDislikes,

        wakeH:wH, wakeM:wM, sleepH:sH, sleepM:sM,

        @keyframes slideUp2{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        body { background:#f0faf5; }
        .inp:focus{outline:none!important;border-color:#0d9470!important;box-shadow:0 0 0 3px #0d947025!important}
        .inp{background:#fff!important;border:1.5px solid #d1e8df!important;border-radius:12px!important;padding:13px 16px!important;font-size:16px!important;color:#1a3a2a!important;width:100%!important;box-sizing:border-box!important;font-family:Georgia,serif!important;transition:all .2s!important}
        input[type=time].inp{color-scheme:light}
        .btn-p:hover{filter:brightness(1.06)!important;transform:translateY(-1px)}
        .btn-b:hover{background:#e8f5ef!important}
        .opt-c{transition:all .2s}
        .opt-c:hover{border-color:#0d9470!important;background:#e8f5ef!important}
        .day-card{transition:all .22s cubic-bezier(.4,0,.2,1)}
        .day-card:hover{transform:translateY(-3px) scale(1.015)!important;box-shadow:0 8px 24px rgba(13,148,112,0.15)!important}
        .mtab:hover{background:#e8f5ef!important;color:#0d9470!important}
        .chip-tag{transition:all .2s}
        .food-chip{cursor:pointer;transition:all .18s;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
        .food-chip:hover{transform:translateY(-1px)}
      `}</style>
      <div style={{ width:"100%", maxWidth:490, animation:"slideUp .4s ease" }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ width:70, height:70, borderRadius:"50%", margin:"0 auto 12px", background:"linear-gradient(135deg,#10b981,#3b82f6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:32, animation:"glow 3s ease infinite" }}>🥗</div>
          <h1 style={{ margin:0, fontSize:28, fontWeight:900, background:"linear-gradient(135deg,#0d9470,#059669,#047857)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>FitPlanner</h1>

            {cur.hint && <p style={{ margin:"0 0 14px", fontSize:11, color:"#5a8a74", lineHeight:1.5 }}>{cur.hint}</p>}

              <div>
                <textarea

                  placeholder="Ex: camarão, amendoim, fígado, cebola crua…"

                      </div>

                  </div>
                )}
                <p style={{ margin:"8px 0 0", fontSize:11, color:"#7aaa90", fontStyle:"italic" }}>

              <div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>

                    const activeBg     = cur.key==="likes" ? "#e8f5ef"  : "#fef2f2";

                          boxShadow: isActive ? `0 2px 8px ${activeBorder}30` : "none",
                        }}>
                        <span>{food.emoji}</span>
                        <span>{food.label}</span>
                        {isActive && <span style={{fontSize:10}}>{cur.key==="likes"?"✓":"✕"}</span>}

                    );
                  })}
                </div>
                <p style={{ margin:0, fontSize:11, color:"#7aaa90", fontStyle:"italic" }}>

                    ? `${(form[cur.key]||[]).length} selecionado(s) · pode pular`

                      ? `${form.dislikes.length} a evitar · pode pular`
                      : `${form.likes.length} favorito(s) · pode pular`}
                </p>
              </div>
            ) : cur.type === "select" ? (
              <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                {cur.options.map(opt => (
                  <div key={opt.v} className="opt-c" onClick={() => setForm(f => ({ ...f, [cur.key]: opt.v }))}

                  >{opt.l}</div>

            {step > 0 && <button className="btn-b" onClick={prev} style={{ flex:1, padding:"12px", border:"1px solid #c8e6d8", borderRadius:11, background:"#f0faf5", color:"#4a6a5a", fontSize:13, cursor:"pointer", transition:"all .2s" }}>← Voltar</button>}
            <button className="btn-p" onClick={next} style={{ flex:2, padding:"12px", background:"linear-gradient(135deg,#10b981,#059669)", border:"none", borderRadius:11, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", transition:"all .2s" }}>
              {step === fields.length-1 ? "🚀 Gerar meu plano!" : "Próximo →"}
            </button>
          </div>
        </div>
        <p style={{ textAlign:"center", color:"#7aaa90", fontSize:10, marginTop:16, fontFamily:"monospace" }}>Dados usados apenas para personalizar horários e macros</p>
      </div>
    </div>
  );
}

// ─── Planner ─────────────────────────────────────────────────────────────────
function Planner({ profile, onReset, onProfileUpdate = () => {}, markUnsaved = () => {}, session = null, onSwitchAccount = null }) {
  const [selDay,      setSelDay]      = useState(null);
  const [activeMeal,  setActiveMeal]  = useState("dinner");
  const [optIdx,      setOptIdx]      = useState({});
  const [showAlexa,   setShowAlexa]   = useState(false);
  const [alexaPeriod, setAlexaPeriod] = useState(null);
  const [showReset,   setShowReset]   = useState(false);

  // ── Theme: 'light' or 'dark'. Persisted in localStorage. The initial class is
  // applied to <html> by a tiny inline script in the page head to avoid a white
  // flash on cold load; here we just keep React state in sync with the DOM.
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("fitplanner_theme_v1") || "light"; } catch { return "light"; }
  });
  const toggleTheme = () => {
    const next = theme === "light" ? "dark" : "light";
    setTheme(next);
    try { localStorage.setItem("fitplanner_theme_v1", next); } catch {}
    document.documentElement.classList.remove("theme-light", "theme-dark");
    document.documentElement.classList.add("theme-" + next);
  };

  // ── Active main tab: 'dashboard' or 'control'
  const [mainTab, setMainTab] = useState(() => {
    try { return localStorage.getItem("fitplanner_maintab_v1") || "control"; } catch { return "control"; }
  });
  const switchTab = (t) => {
    setMainTab(t);
    setSelDay(null); // close any open day-detail modal when switching tabs
    try { localStorage.setItem("fitplanner_maintab_v1", t); } catch {}
  };

  // ── Dynamic "today" plan day — recomputes on focus, visibility change, and every minute
  // so the blue HOJE marker stays accurate even if the app stays open across midnight.
  const [todayPlanDay, setTodayPlanDay] = useState(() => getPlanDayForToday(profile.dietStartDate));
  useEffect(() => {
    const update = () => setTodayPlanDay(getPlanDayForToday(profile.dietStartDate));
    update();
    const interval = setInterval(update, 60000); // every minute catches midnight crossings
    const onFocus = () => update();
    const onVisibility = () => { if (document.visibilityState === "visible") update(); };
    window.addEventListener("focus", onFocus);
    document.addEventListener("visibilitychange", onVisibility);
    return () => {
      clearInterval(interval);
      window.removeEventListener("focus", onFocus);
      document.removeEventListener("visibilitychange", onVisibility);
    };
  }, [profile.dietStartDate]);

  const [doneDays,    setDoneDays]    = useState(() => {
    try { return JSON.parse(localStorage.getItem("fitplanner_done_v1") || "[]"); } catch { return []; }
  });
  const [popup,       setPopup]       = useState(null); // {day, type:"done"|"reset"}
  const [showWorkout, setShowWorkout] = useState(false);
  const [workoutDay,  setWorkoutDay]  = useState(null);
  const [workouts,    setWorkouts]    = useState(() => {
    try { return JSON.parse(localStorage.getItem("fitplanner_workouts_v1") || "{}"); } catch { return {}; }
  });

  const [showMonthly, setShowMonthly] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [waterData,   setWaterData]   = useState(() => {
    try { return JSON.parse(localStorage.getItem("fitplanner_water_v2") || "{}"); } catch { return {}; }
  });
  // Tracks the last day the user actively marked glasses for (for the "switch-day reset" rule).
  // When the user starts marking water for a different day, the previous day is wiped.
  const [lastWaterDay, setLastWaterDay] = useState(() => {
    try { return localStorage.getItem("fitplanner_water_lastday_v1") || null; } catch { return null; }
  });

  const handleWaterChange = (dayKey, value) => {
    let updated = { ...waterData };
    // If the user is starting to track a DIFFERENT day than the last one they were tracking,
    // wipe the previous day's count (per user request: "began to mark items on other days,
    // then reset the hydration control of the day they were marking").
    // We only reset when ADDING (value > current), not when the user is editing the active day.
    const prevValue = waterData[dayKey] || 0;
    const isAdding  = value > prevValue;
    if (isAdding && lastWaterDay && lastWaterDay !== dayKey) {
      delete updated[lastWaterDay];
    }
    updated[dayKey] = value;
    setWaterData(updated);
    setLastWaterDay(dayKey);
    try {
      localStorage.setItem("fitplanner_water_v2", JSON.stringify(updated));
      localStorage.setItem("fitplanner_water_lastday_v1", dayKey);
    } catch {}
    markUnsaved();
  };
  const [doneMeals,   setDoneMeals]   = useState(() => {
    try { return JSON.parse(localStorage.getItem("fitplanner_meals_v1") || "{}"); } catch { return {}; }
  });

  const toggleMealDone = (day, mealKey) => {
    const k = `${day}-${mealKey}`;
    const updated = { ...doneMeals };
    if (updated[k]) delete updated[k];
    else updated[k] = true;
    try { localStorage.setItem("fitplanner_meals_v1", JSON.stringify(updated)); } catch {}
    setDoneMeals(updated);
    markUnsaved();
  };

  const isMealDone   = (day, mealKey) => !!doneMeals[`${day}-${mealKey}`];
  const dayMealsDone = (day) => MEAL_TYPES.filter(mt => doneMeals[`${day}-${mt.key}`]).length;

  const saveWorkout = (day, data) => {
    const updated = { ...workouts };
    if (data === null) delete updated[day];
    else updated[day] = data;
    try { localStorage.setItem("fitplanner_workouts_v1", JSON.stringify(updated)); } catch {}
    setWorkouts(updated);
    markUnsaved();
  };

  const openWorkout = (day, e) => {
    if (e) e.stopPropagation();
    setWorkoutDay(day);
    setShowWorkout(true);
  };

  const saveDone = (days) => {
    try { localStorage.setItem("fitplanner_done_v1", JSON.stringify(days)); } catch {}
    setDoneDays(days);
    markUnsaved();
  };

  const markDone = (day) => {
    const updated = doneDays.includes(day) ? doneDays.filter(d=>d!==day) : [...doneDays, day];
    saveDone(updated);
    setPopup(null);
  };

  const resetAll = () => {
    saveDone([]);
    setPopup(null);
  };

  // Wipe ALL marking data from the entire plan (used by the reset modal "all" option)
  // Keeps profile, diet settings, food prefs intact — only clears tracking marks.
  const wipeEverything = () => {
    saveDone([]);
    setWaterData({});
    setLastWaterDay(null);
    setWorkouts({});
    setDoneMeals({});
    try {
      localStorage.removeItem("fitplanner_water_v2");
      localStorage.removeItem("fitplanner_water_lastday_v1");
      localStorage.removeItem("fitplanner_workouts_v1");
      localStorage.removeItem("fitplanner_meals_v1");
    } catch {}
    markUnsaved();
    setPopup(null);
    setShowReset(false);
  };

  // Clears ALL markings for a single day: done status, water glasses, workouts, meal completion.
  // Used by the "Zerar marcações deste dia" button in the day control popup.
  const clearDay = (day) => {
    // 1. Remove from doneDays
    if (doneDays.includes(day)) {
      saveDone(doneDays.filter(d => d !== day));
    }
    // 2. Remove water for this day
    const waterKey = `day_${day}`;
    if (waterData[waterKey] !== undefined) {
      const updated = { ...waterData };
      delete updated[waterKey];
      setWaterData(updated);
      try { localStorage.setItem("fitplanner_water_v2", JSON.stringify(updated)); } catch {}
      // If this was the last tracked day, also clear the lastWaterDay marker
      if (lastWaterDay === waterKey) {
        setLastWaterDay(null);
        try { localStorage.removeItem("fitplanner_water_lastday_v1"); } catch {}
      }
    }
    // 3. Remove workouts for this day
    if (workouts[day]) {
      const updated = { ...workouts };
      delete updated[day];
      setWorkouts(updated);
      try { localStorage.setItem("fitplanner_workouts_v1", JSON.stringify(updated)); } catch {}
    }
    // 4. Remove all meals done for this day
    const mealKeys = Object.keys(doneMeals).filter(k => k.startsWith(`${day}-`));
    if (mealKeys.length > 0) {
      const updated = { ...doneMeals };
      mealKeys.forEach(k => delete updated[k]);
      setDoneMeals(updated);
      try { localStorage.setItem("fitplanner_meals_v1", JSON.stringify(updated)); } catch {}
    }
    markUnsaved();
    setPopup(null);
  };

  const handleDayClick = (day) => {
    // Clicking the already-selected day → deselect, no popup
    if (selDay === day) { setSelDay(null); return; }

    // Auto-complete all days strictly before this one that aren't done yet
    const daysToAutoComplete = Array.from({length: day - 1}, (_,i) => i + 1)
      .filter(d => !doneDays.includes(d));

    if (daysToAutoComplete.length > 0) {
      const allDone = [...new Set([...doneDays, ...daysToAutoComplete])];
      saveDone(allDone);
    }

    // Special: if this is day 30 and all previous are done, show reset prompt
    if (day === 30 && (doneDays.length + daysToAutoComplete.length) >= 29) {
      setSelDay(day);
      setPopup({ day: 30, type:"reset" });
      return;
    }

    // Reset water + calorie display for the new day
    // (Each day keyed separately — moving to a new day makes it start at 0)
    // We don't delete existing data, just let the new key start fresh naturally

    setSelDay(day);
  };

  setGlobalProfile(profile); // update global for getOptions scoring
  const schedule = useMemo(() =>
    calcSchedule(profile.wakeH, profile.wakeM, profile.sleepH, profile.sleepM),
    [profile]);

  const getOpt     = (day, mt) => optIdx[`${day}-${mt}`] ?? getDefaultOption(day);
  const setOpt     = (day, mt, i) => setOptIdx(o => ({ ...o, [`${day}-${mt}`]: i }));
  const getMealsFn = (day, mt) => getOpt(day, mt);

  const dayRow  = selDay ? MEALS_DB.find(d => d.day === selDay) : null;
  const options = dayRow ? dayRow.getOptions(activeMeal) : [];
  const oI      = selDay ? getOpt(selDay, activeMeal) : 0;
  const meal    = options[oI] || null;
  const macros  = meal ? calcMacros(profile, meal, activeMeal) : null;
  const tc      = meal ? (tagColors[meal.tag] || "#10b981") : "#10b981";
  const mt      = MEAL_TYPES.find(m => m.key === activeMeal);

  const dayCost = (day) => {
    const d = MEALS_DB.find(x => x.day === day);
    return d ? MEAL_TYPES.reduce((s, m) => s + (d.getOptions(m.key)[getOpt(day, m.key)]?.cost || 0), 0) : 0;
  };
  // Budget-adjusted monthly cost: sum of actual recipe costs for selected options
  const totalCost = useMemo(() =>
    MEALS_DB.reduce((s, d) => s + dayCost(d.day), 0),
    [optIdx, profile]  // eslint-disable-line
  );
  // Budget expectation from registration
  const budgetExpected = { low:400, medium:600, high:1100, premium:2000 }[profile.budget || "medium"];

  const goalLabels = { lose_fast:"Perda Acelerada", lose:"Perda Moderada", maintain:"Manutenção", gain:"Ganho Muscular" };

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#e8f8f1 0%,#f4fbf7 50%,#edf7f2 100%)", fontFamily:"'Georgia',serif", padding:"22px 14px", color:"#1a3a2a" }}>
      {showAlexa && <AlexaModal getMealsFn={getMealsFn} initialPeriod={alexaPeriod} onClose={() => { setShowAlexa(false); setAlexaPeriod(null); }} />}
      {showProfile && <ProfileModal profile={profile} onSave={(updated) => { onProfileUpdate(updated); setShowProfile(false); }} onClose={() => setShowProfile(false)} />}
      {showWorkout && <WorkoutModal day={workoutDay} existing={workouts[workoutDay]||null} onSave={(data) => saveWorkout(workoutDay, data)} onClose={() => setShowWorkout(false)} profileWeight={profile.weight} />}
      {showReset && (
        <ResetModal
          doneDaysCount={doneDays.length}
          hasAnyData={doneDays.length > 0 || Object.keys(waterData).length > 0 || Object.keys(workouts).length > 0 || Object.keys(doneMeals).length > 0}
          onResetAll={wipeEverything}
          onResetDay={(d) => { clearDay(d); setShowReset(false); }}
          onClose={() => setShowReset(false)}
        />
      )}

      {/* ── DAY DONE / RESET POPUP ── */}
      {popup && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
          onClick={() => setPopup(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ width:"100%", maxWidth:360, background:"#fff", border:`1px solid ${popup.type==="reset"?"#ec4899":"#10b981"}50`, borderRadius:22, padding:"28px 24px", boxShadow:"0 32px 80px rgba(0,0,0,0.8)", animation:"fadeUp .25s ease" }}>
            {popup.type === "reset" ? (
              <>
                <div style={{ fontSize:36, textAlign:"center", marginBottom:12 }}>🏆</div>
                <h3 style={{ margin:"0 0 8px", fontSize:18, fontWeight:800, color:"#1a3a2a", textAlign:"center" }}>Parabéns! Dia 30 concluído!</h3>
                <p style={{ margin:"0 0 22px", fontSize:13, color:"#64748b", textAlign:"center", lineHeight:1.6 }}>Você completou os 30 dias do plano! Deseja reiniciar do Dia 1, zerando todos os dias marcados?</p>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setPopup(null)} style={{ flex:1, padding:"12px", border:"1px solid rgba(255,255,255,0.1)", borderRadius:11, background:"rgba(255,255,255,0.04)", color:"#64748b", fontSize:13, cursor:"pointer" }}>Não agora</button>
                  <button onClick={resetAll} style={{ flex:1, padding:"12px", border:"none", borderRadius:11, background:"linear-gradient(135deg,#ec4899,#8b5cf6)", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>🔄 Reiniciar do Dia 1</button>
                </div>
              </>
            ) : (
              (() => {
                const dp = calcDailyCalorieProfile(profile, popup.day, optIdx, workouts);
                const woList = getWorkoutsForDay(workouts, popup.day);
                const hasWo = woList.length > 0;
                const totalWoMins = woList.filter(w => w.type !== "rest").reduce((s, w) => s + (Number(w.duration)||0), 0);
                const isDone = doneDays.includes(popup.day);
                const dc = dayCost(popup.day);
                return (
                  <>
                    {/* Header */}
                    <div style={{ textAlign:"center", marginBottom:16 }}>
                      <div style={{ fontSize:isDone ? 36 : 32, marginBottom:6 }}>{isDone ? "✅" : "📅"}</div>
                      <h3 style={{ margin:"0 0 4px", fontSize:18, fontWeight:800, color:"#1a3a2a" }}>
                        Dia {String(popup.day).padStart(2,"0")}
                      </h3>
                      <p style={{ margin:0, fontSize:12, color: isDone?"#0d9470":"#64748b", fontWeight: isDone?700:400 }}>
                        {isDone ? "✓ Dia marcado como concluído" : "Você completou as atividades deste dia?"}
                      </p>
                    </div>

                    {/* Summary cards */}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                      <div style={{ background:"#fef3c7", border:"1px solid #fbbf24", borderRadius:11, padding:"10px 12px" }}>
                        <div style={{ fontSize:9, fontFamily:"monospace", color:"#92400e", fontWeight:700, marginBottom:3 }}>🍽️ CONSUMIDO</div>
                        <div style={{ fontSize:18, fontWeight:900, color:"#b45309" }}>{dp.consumed} kcal</div>
                        <div style={{ fontSize:9, color:"#92400e" }}>meta: {dp.dietTarget} kcal</div>
                      </div>
                      <div style={{ background:"#fef2f2", border:"1px solid #fca5a5", borderRadius:11, padding:"10px 12px" }}>
                        <div style={{ fontSize:9, fontFamily:"monospace", color:"#991b1b", fontWeight:700, marginBottom:3 }}>🔥 GASTO TOTAL</div>
                        <div style={{ fontSize:18, fontWeight:900, color:"#dc2626" }}>{dp.totalExpenditure} kcal</div>
                        <div style={{ fontSize:9, color:"#991b1b" }}>TDEE + treino</div>
                      </div>
                      <div style={{ background: dp.netBalance<=0?"#e8f5ef":"#fff7ed", border:`1px solid ${dp.netBalance<=0?"#10b981":"#f97316"}`, borderRadius:11, padding:"10px 12px" }}>
                        <div style={{ fontSize:9, fontFamily:"monospace", color: dp.netBalance<=0?"#065f46":"#c2410c", fontWeight:700, marginBottom:3 }}>
                          {dp.netBalance<=0?"📉 DÉFICIT":"📈 SUPERÁVIT"}
                        </div>
                        <div style={{ fontSize:18, fontWeight:900, color: dp.netBalance<=0?"#10b981":"#f97316" }}>{Math.abs(dp.netBalance)} kcal</div>
                        <div style={{ fontSize:9, color:"#4a6a5a" }}>{dp.netBalance<=0?"ótimo! 🎯":"acima do planejado"}</div>
                      </div>
                      <div style={{ background: hasWo?"#ede9fe":"#f8fafc", border:`1px solid ${hasWo?"#8b5cf6":"#c8e6d8"}`, borderRadius:11, padding:"10px 12px" }}>
                        <div style={{ fontSize:9, fontFamily:"monospace", color: hasWo?"#5b21b6":"#4a6a5a", fontWeight:700, marginBottom:3 }}>🏋️ TREINO{woList.length > 1 ? `S (${woList.length})` : ""}</div>
                        {hasWo ? (
                          <>
                            <div style={{ fontSize:13, fontWeight:800, color:"#4c1d95", display:"flex", gap:3, flexWrap:"wrap" }}>
                              {woList.slice(0,3).map((w,i) => {
                                const wti = WORKOUT_TYPES.find(x => x.id === w.type) || WORKOUT_TYPES[0];
                                return <span key={i}>{wti.emoji}</span>;
                              })}
                              {woList.length > 3 && <span style={{ fontSize:10 }}>+{woList.length-3}</span>}
                            </div>
                            <div style={{ fontSize:9, color:"#6d28d9" }}>{totalWoMins} min · {dp.burned} kcal</div>
                          </>
                        ) : (
                          <div style={{ fontSize:12, color:"#94a3b8" }}>Não registrado</div>
                        )}
                      </div>
                    </div>

                    {/* Meals completion row */}
                    <div style={{ background: dayMealsDone(popup.day)===MEAL_TYPES.length?"#e8f5ef":"#f8fbf8", border:`1px solid ${dayMealsDone(popup.day)===MEAL_TYPES.length?"#10b981":"#c8e6d8"}`, borderRadius:10, padding:"8px 12px", marginBottom:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:11, color:"#4a6a5a" }}>🍽️ Refeições feitas</span>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ display:"flex", gap:3 }}>
                          {MEAL_TYPES.map(mt2 => (
                            <div key={mt2.key} style={{ width:14, height:14, borderRadius:4, background: isMealDone(popup.day, mt2.key)?mt2.color:"#e2e8f0", title:mt2.label }} title={mt2.label} />
                          ))}
                        </div>
                        <span style={{ fontSize:12, fontWeight:700, color: dayMealsDone(popup.day)===MEAL_TYPES.length?"#059669":"#4a6a5a" }}>
                          {dayMealsDone(popup.day)}/{MEAL_TYPES.length}
                        </span>
                      </div>
                    </div>

                    {/* ── HYDRATION CONTROL — clickable glasses to mark drinks for this day ── */}
                    {(() => {
                      const totalLitersP = parseFloat(calcWaterLiters(profile));
                      const glassMLP     = 250;
                      const totalGlassesP = Math.round((totalLitersP * 1000) / glassMLP);
                      const dayKeyP   = `day_${popup.day}`;
                      const drankP    = waterData[dayKeyP] || 0;
                      const pctP      = totalGlassesP > 0 ? Math.min(drankP/totalGlassesP, 1) : 0;
                      const statusColorP = pctP >= 1 ? "#10b981" : pctP >= 0.5 ? "#3b82f6" : pctP >= 0.25 ? "#f59e0b" : "#ef4444";
                      const willResetP = lastWaterDay && lastWaterDay !== dayKeyP && drankP === 0;
                      const prevDayLabelP = willResetP
                        ? (lastWaterDay.startsWith("day_") ? `Dia ${lastWaterDay.replace("day_","").padStart(2,"0")}` : "dia anterior")
                        : null;
                      const setGlasses = (v) => handleWaterChange(dayKeyP, Math.max(0, Math.min(v, totalGlassesP)));
                      return (
                        <div style={{ background:"linear-gradient(135deg,#eff6ff,#dbeafe)", border:`1.5px solid ${statusColorP}40`, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                            <span style={{ fontSize:11, color:"#1d4ed8", fontWeight:700 }}>💧 Hidratação</span>
                            <span style={{ fontSize:12, fontWeight:800, color:statusColorP }}>{drankP}/{totalGlassesP} copos</span>
                          </div>
                          {/* Mini progress bar */}
                          <div style={{ height:5, background:"#bfdbfe", borderRadius:3, marginBottom:8, overflow:"hidden" }}>
                            <div style={{ height:"100%", width:`${pctP*100}%`, background:`linear-gradient(90deg,#3b82f6,${statusColorP})`, borderRadius:3, transition:"width .3s ease" }} />
                          </div>
                          {/* Warning when switching day */}
                          {willResetP && (
                            <div style={{ fontSize:9, color:"#92400e", background:"#fef3c7", border:"1px solid #f59e0b", borderRadius:6, padding:"4px 7px", marginBottom:7 }}>
                              ⚠️ Marcar aqui zera o controle do {prevDayLabelP}
                            </div>
                          )}
                          {/* Clickable glasses */}
                          <div style={{ display:"flex", flexWrap:"wrap", gap:3, justifyContent:"center" }}>
                            {Array.from({ length: totalGlassesP }).map((_, i) => {
                              const filled = i < drankP;
                              return (
                                <div key={i}
                                  onClick={() => filled ? setGlasses(drankP - 1) : setGlasses(i + 1)}
                                  title={filled ? "Clique para remover" : `Marcar até copo ${i+1}`}
                                  style={{
                                    width:22, height:28, borderRadius:5, cursor:"pointer",
                                    border:`1.5px solid ${filled ? "#3b82f6" : "#bfdbfe"}`,
                                    background: filled ? "linear-gradient(180deg,#93c5fd,#3b82f6)" : "#f0f9ff",
                                    display:"flex", alignItems:"center", justifyContent:"center",
                                    transition:"all .15s",
                                    fontSize:12,
                                  }}>
                                  {filled ? "💧" : ""}
                                </div>
                              );
                            })}
                          </div>
                          <div style={{ display:"flex", justifyContent:"space-between", marginTop:7, gap:6 }}>
                            <button onClick={() => setGlasses(drankP + 1)} disabled={drankP >= totalGlassesP}
                              style={{ flex:1, padding:"6px", border:"none", borderRadius:7, background: drankP >= totalGlassesP ? "#e2e8f0" : "linear-gradient(135deg,#3b82f6,#2563eb)", color: drankP >= totalGlassesP ? "#94a3b8" : "#fff", fontSize:11, fontWeight:700, cursor: drankP >= totalGlassesP ? "not-allowed" : "pointer" }}>
                              💧 +1 copo

                  ? (lastWaterDay.startsWith("day_") ? `Dia ${lastWaterDay.replace("day_","").padStart(2,"0")}` : "dia anterior")

                        </div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontSize:20, fontWeight:900, color:statusColorD, lineHeight:1 }}>{drankD}<span style={{ fontSize:13, color:"#64748b" }}>/{totalGlassesD}</span></div>
                        <div style={{ fontSize:10, color:statusColorD, fontWeight:600 }}>{statusLabelD}</div>

const STORAGE_KEY = "fitplanner_profile_v1";

function loadProfile() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
function saveProfile(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}
function clearProfile() {
  try { localStorage.removeItem(STORAGE_KEY); } catch {}
}

// ─── Auth Screen ──────────────────────────────────────────────────────────────
// Email + password login/signup. Also offers "Continue offline" for users who
// want to use the app without cloud sync.
function AuthScreen({ onAuthenticated, onSkip }) {
  const [mode, setMode]         = useState("login"); // login | signup
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState("");
  const [info, setInfo]         = useState("");

  const submit = async () => {
    setError(""); setInfo("");
    if (!email || !email.includes("@")) { setError("Digite um email válido"); return; }
    if (!password || password.length < 6) { setError("A senha precisa ter no mínimo 6 caracteres"); return; }

    const sb = getSupabase();
    if (!sb) { setError("Não foi possível conectar ao servidor. Verifique sua internet."); return; }

    setLoading(true);
    try {
      if (mode === "signup") {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        if (data.session) {
          // Auto-confirmed (email confirmation disabled in Supabase project)
          onAuthenticated(data.session);
        } else {
          // Email confirmation required
          setInfo("✉️ Conta criada! Verifique seu email para confirmar e depois faça login.");
          setMode("login");
        }
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onAuthenticated(data.session);
      }
    } catch (e) {
      const msg = (e && e.message) || "Erro desconhecido";
      // Translate common errors to Portuguese
      const translated = msg
        .replace("Invalid login credentials", "Email ou senha incorretos")
        .replace("User already registered", "Este email já tem conta. Use 'Entrar'.")
        .replace("Email not confirmed", "Email ainda não confirmado. Verifique sua caixa de entrada.")
        .replace("Password should be at least 6 characters", "A senha precisa ter no mínimo 6 caracteres");
      setError(translated);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#10b981 0%,#3b82f6 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:420, background:"#fff", borderRadius:22, padding:"30px 24px 26px", boxShadow:"0 24px 60px rgba(0,0,0,0.25)" }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:22 }}>
          <div style={{ width:62, height:62, margin:"0 auto 12px", borderRadius:"50%", background:"linear-gradient(135deg,#10b981,#3b82f6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:30, boxShadow:"0 6px 20px rgba(16,185,129,0.35)" }}>🥗</div>
          <div style={{ fontSize:11, fontFamily:"monospace", color:"#0d9470", letterSpacing:3, fontWeight:700 }}>FITPLANNER</div>
          <h2 style={{ margin:"3px 0 4px", fontSize:21, fontWeight:800, color:"#1a3a2a", fontFamily:"Georgia,serif" }}>
            {mode === "login" ? "Bem-vindo de volta!" : "Crie sua conta"}
          </h2>
          <p style={{ margin:0, fontSize:12, color:"#64748b", lineHeight:1.5 }}>
            {mode === "login"
              ? "Entre para sincronizar entre celular e computador"
              : "Seus dados sincronizam automaticamente entre dispositivos"}
          </p>
        </div>

        {/* Tab switcher */}
        <div style={{ display:"flex", background:"#f1f5f9", borderRadius:11, padding:3, marginBottom:18 }}>
          {[
            { id:"login", label:"Entrar" },
            { id:"signup", label:"Criar conta" },
          ].map(t => (
            <button key={t.id} onClick={() => { setMode(t.id); setError(""); setInfo(""); }}
              style={{ flex:1, padding:"9px", border:"none", borderRadius:8, background: mode===t.id?"#fff":"transparent", color: mode===t.id?"#0d9470":"#64748b", fontSize:13, fontWeight:700, cursor:"pointer", boxShadow: mode===t.id?"0 2px 6px rgba(0,0,0,0.08)":"none", transition:"all .2s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* Email */}
        <div style={{ marginBottom:12 }}>
          <label style={{ display:"block", fontSize:10, fontFamily:"monospace", color:"#0d9470", letterSpacing:1.5, fontWeight:700, marginBottom:5 }}>📧 EMAIL</label>
          <input type="email" autoComplete="email" value={email} onChange={e => setEmail(e.target.value)}
            placeholder="seu@email.com"
            onKeyDown={e => e.key === "Enter" && submit()}
            style={{ width:"100%", boxSizing:"border-box", padding:"11px 14px", border:"1.5px solid #c8e6d8", borderRadius:11, fontSize:14, color:"#1a3a2a", background:"#fafffe", outline:"none", fontFamily:"Georgia,serif" }} />
        </div>

        {/* Password */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", fontSize:10, fontFamily:"monospace", color:"#0d9470", letterSpacing:1.5, fontWeight:700, marginBottom:5 }}>🔒 SENHA</label>
          <input type="password" autoComplete={mode==="signup"?"new-password":"current-password"} value={password} onChange={e => setPassword(e.target.value)}
            placeholder={mode==="signup"?"Mínimo 6 caracteres":"Sua senha"}
            onKeyDown={e => e.key === "Enter" && submit()}
            style={{ width:"100%", boxSizing:"border-box", padding:"11px 14px", border:"1.5px solid #c8e6d8", borderRadius:11, fontSize:14, color:"#1a3a2a", background:"#fafffe", outline:"none", fontFamily:"Georgia,serif" }} />
        </div>

        {/* Error / info messages */}
        {error && (
          <div style={{ marginBottom:12, padding:"9px 12px", background:"#fef2f2", border:"1.5px solid #fca5a5", borderRadius:10, fontSize:12, color:"#dc2626", lineHeight:1.5 }}>
            ⚠️ {error}
          </div>
        )}
        {info && (
          <div style={{ marginBottom:12, padding:"9px 12px", background:"#eff6ff", border:"1.5px solid #93c5fd", borderRadius:10, fontSize:12, color:"#1d4ed8", lineHeight:1.5 }}>
            {info}
          </div>
        )}

        {/* Submit button */}
        <button onClick={submit} disabled={loading}
          style={{ width:"100%", padding:"13px", border:"none", borderRadius:12, background: loading ? "#94a3b8" : "linear-gradient(135deg,#10b981,#059669)", color:"#fff", fontSize:14, fontWeight:700, cursor: loading?"not-allowed":"pointer", marginBottom:11, fontFamily:"Georgia,serif" }}>
          {loading ? "Aguarde..." : (mode === "login" ? "🔓 Entrar" : "✨ Criar minha conta")}
        </button>

        {/* Continue offline */}
        <button onClick={onSkip}
          style={{ width:"100%", padding:"10px", border:"1.5px solid #c8e6d8", borderRadius:11, background:"#fff", color:"#4a6a5a", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"monospace" }}>
          📵 Continuar sem sincronização
        </button>
        <p style={{ margin:"9px 0 0", fontSize:9, color:"#94a3b8", textAlign:"center", lineHeight:1.5 }}>
          Sem sincronização, os dados ficam apenas neste dispositivo
        </p>
      </div>
    </div>
  );
}

function App() {
  const [profile,     setProfile]     = useState(() => loadProfile());
  const [toast,       setToast]       = useState("");
  const [showExitPrompt, setShowExitPrompt] = useState(false);
  const [hasUnsaved,  setHasUnsaved]  = useState(false);

  // ── Cloud sync state ────────────────────────────────────────────────────────
  // session          — Supabase auth session (null = not logged in / offline mode)
  // authChecked      — true once we've checked for an existing session on startup
  // skipAuth         — user chose to use the app offline (skips the auth screen)
  // syncStatus       — "offline" | "syncing" | "synced" | "error" | "pending"
  // showSyncMenu     — small dropdown menu open
  // initialSyncDone  — true once we've finished the FIRST cloud download after login.
  //                    Prevents flashing the RegisterScreen before we know whether
  //                    the user already has a profile in the cloud.
  const [session,         setSession]         = useState(null);
  const [authChecked,     setAuthChecked]     = useState(false);
  const [skipAuth,        setSkipAuth]        = useState(() => {
    try { return localStorage.getItem("fitplanner_skip_auth_v1") === "1"; } catch { return false; }
  });
  const [syncStatus,      setSyncStatus]      = useState("offline");
  const [showSyncMenu,    setShowSyncMenu]    = useState(false);
  const [showAuthScreen,  setShowAuthScreen]  = useState(false);
  const [initialSyncDone, setInitialSyncDone] = useState(false);

  // Track unsaved changes — set true whenever any data changes
  const markUnsaved = () => {
    setHasUnsaved(true);
    // If we're logged in, this means we have pending data to upload
    if (session) setSyncStatus("pending");
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3200);
  };

  const handleRegister = (p) => {
    saveProfile(p);
    setProfile(p);
    setHasUnsaved(false);
    showToast("✓ Perfil salvo!");
    // If the user is logged in, upload IMMEDIATELY (no debounce) so the
    // registration is persisted to the server right away. This is critical:
    // without it, if the user closes the app within 2s of registering,
    // the profile is lost on other devices.
    if (session) {
      const sb = getSupabase();
      if (sb) {
        sb.from(SYNC_TABLE).upsert({
          user_id: session.user.id,
          data: readLocalSnapshot(),
          updated_at: new Date().toISOString(),
        }).then(({ error }) => {
          if (error) {
            console.error("Immediate upload failed:", error);
            setSyncStatus("error");
          } else {
            setSyncStatus("synced");
            try { localStorage.setItem("fitplanner_last_user_id", session.user.id); } catch {}
          }
        });
      }
    }
  };

  // Save all data to localStorage (it's already being saved on each change,
  // but this gives the user explicit confirmation)
  const saveAll = () => {
    if (profile) saveProfile(profile);
    setHasUnsaved(false);
    showToast("✓ Todos os dados foram salvos!");
    setShowExitPrompt(false);
  };

  const handleReset = () => {
    if (hasUnsaved) {
      setShowExitPrompt(true);
    } else {
      clearProfile();
      setProfile(null);
    }
  };

  // ── Check for existing Supabase session on mount ────────────────────────────
  useEffect(() => {
    const sb = getSupabase();
    if (!sb) {
      // SDK failed to load — fall back to offline mode silently
      setAuthChecked(true);
      return;
    }
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session || null);
      setAuthChecked(true);
    }).catch(() => setAuthChecked(true));

    // Listen for auth state changes (login, logout, token refresh)
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession || null);
    });
    return () => subscription?.unsubscribe();
  }, []);

  // ── Sync data from cloud whenever session changes ──────────────────────────
  // SIMPLE & SAFE RULE: when the session changes (login/relogin/account switch),
  // we ALWAYS:
  //   1. Wipe local storage (so no leftover data from a previous user)
  //   2. Reset React profile state
  //   3. Download from the server for this user_id
  //   4. If server has data → restore it locally
  //   5. If server is empty → go to RegisterScreen (fresh account)
  //
  // No "migration" logic — that was the source of cross-account data leakage.
  // The trade-off: someone who registered offline before signing up will need
  // to re-enter their profile in the new account. This is acceptable because
  // (a) the leak was a serious bug, and (b) registration is fast.
  useEffect(() => {
    if (!session) {
      setSyncStatus("offline");
      setInitialSyncDone(false);
      return;
    }
    let cancelled = false;
    setInitialSyncDone(false);

    const newUid = session.user.id;

    // STEP 1-2: always wipe local + reset state, before doing anything else.
    // This is the key fix: even if last_user_id matches, we still wipe, because
    // we trust the server as the only source of truth.
    clearAllSyncData();
    setProfile(null);
    setHasUnsaved(false);
    try { localStorage.setItem("fitplanner_last_user_id", newUid); } catch {}

    (async () => {
      const sb = getSupabase();
      if (!sb) {
        if (!cancelled) setInitialSyncDone(true);
        return;
      }
      setSyncStatus("syncing");
      try {
        const { data, error } = await sb
          .from(SYNC_TABLE)
          .select("data, updated_at")
          .eq("user_id", newUid)
          .maybeSingle();
        if (cancelled) return;
        if (error) throw error;

        if (data && data.data && Object.keys(data.data).length > 0) {
          // Server has data for THIS user — restore it locally + React state
          writeLocalSnapshot(data.data);
          const p = loadProfile();
          setProfile(p);
          setHasUnsaved(false);
          setSyncStatus("synced");
          showToast(p ? `☁️ Bem-vindo de volta, ${p.name}!` : "☁️ Dados sincronizados");
        } else {
          // Server is empty for this user — fresh account, RegisterScreen will show
          setProfile(null);
          setSyncStatus("synced");
        }
      } catch (e) {
        if (!cancelled) {
          setSyncStatus("error");
          console.error("Sync error:", e);
        }
      } finally {
        if (!cancelled) setInitialSyncDone(true);
      }
    })();

    return () => { cancelled = true; };
  }, [session?.user?.id]);

  // ── Auto-upload when there are unsaved changes (debounced) ─────────────────
  useEffect(() => {
    if (!session || !hasUnsaved) return;
    const timer = setTimeout(async () => {
      const sb = getSupabase();
      if (!sb) return;
      setSyncStatus("syncing");
      try {
        const snapshot = readLocalSnapshot();
        const { error } = await sb.from(SYNC_TABLE).upsert({
          user_id: session.user.id,
          data: snapshot,
          updated_at: new Date().toISOString(),
        });
        if (error) throw error;
        setHasUnsaved(false);
        setSyncStatus("synced");
      } catch (e) {
        setSyncStatus("error");
        console.error("Upload error:", e);
      }
    }, 2000); // wait 2s after last change before uploading
    return () => clearTimeout(timer);
  }, [hasUnsaved, session]);

  // Manual sync trigger (from the sync menu)
  const handleSyncNow = async () => {
    setShowSyncMenu(false);
    if (!session) return;
    const sb = getSupabase();
    if (!sb) return;
    setSyncStatus("syncing");
    try {
      const snapshot = readLocalSnapshot();
      const { error } = await sb.from(SYNC_TABLE).upsert({
        user_id: session.user.id,
        data: snapshot,
        updated_at: new Date().toISOString(),
      });
      if (error) throw error;
      setHasUnsaved(false);
      setSyncStatus("synced");
      showToast("☁️ Sincronizado com sucesso!");
    } catch (e) {
      setSyncStatus("error");
      showToast("⚠️ Erro ao sincronizar");
    }
  };

  // Login flow: just sets the session. The useEffect listening on session.user.id
  // will handle wiping local data and downloading from the server.
  const handleAuthenticated = (newSession) => {
    setSession(newSession);
    setSkipAuth(false);
    try { localStorage.removeItem("fitplanner_skip_auth_v1"); } catch {}
    setShowAuthScreen(false);
    showToast("✓ Login realizado!");
  };

  // Logout flow: wipe device data and return to the auth screen so a different
  // user can sign in cleanly. Server data is untouched.
  const handleLogout = async () => {
    setShowSyncMenu(false);
    if (!window.confirm("Sair desta conta?\n\nOs dados desta conta serão removidos deste dispositivo.\nQuando você entrar de novo (nesta ou em outra conta), o servidor enviará os dados de volta.")) return;
    const sb = getSupabase();
    if (sb) {
      try { await sb.auth.signOut(); } catch {}
    }
    // Wipe ALL synced data from this device so the next user doesn't see
    // leftover data from this one.
    clearAllSyncData();
    try { localStorage.removeItem("fitplanner_last_user_id"); } catch {}
    setProfile(null);
    setSession(null);
    setSyncStatus("offline");
    setHasUnsaved(false);
    setInitialSyncDone(false);
    // Important: do NOT enable skipAuth — we want the user to see the login screen
    setSkipAuth(false);
    try { localStorage.removeItem("fitplanner_skip_auth_v1"); } catch {}
    showToast("👋 Você saiu da conta");
  };

  // Skip auth (use offline)
  const handleSkipAuth = () => {
    setSkipAuth(true);
    try { localStorage.setItem("fitplanner_skip_auth_v1", "1"); } catch {}
  };

  // Open auth screen from the sync menu
  const handleOpenAuth = () => {
    setShowSyncMenu(false);
    setShowAuthScreen(true);
  };

  // beforeunload — native browser prompt as fallback
  useEffect(() => {
    const handler = (e) => {
      if (hasUnsaved) {
        e.preventDefault();
        e.returnValue = "Você tem dados não confirmados. Deseja sair mesmo assim?";
        return e.returnValue;
      }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [hasUnsaved]);

  // Also listen for visibility change (tab hidden / app backgrounded on mobile)
  useEffect(() => {
    const handler = () => {
      if (document.visibilityState === "hidden" && hasUnsaved) {
        if (profile) saveProfile(profile);
      }
    };
    document.addEventListener("visibilitychange", handler);
    return () => document.removeEventListener("visibilitychange", handler);
  }, [hasUnsaved, profile]);

  // ── Render decision tree ────────────────────────────────────────────────────
  // 1. While checking session, show nothing (avoids flash)
  // 2. If not logged in AND user hasn't skipped, show auth screen
  // 3. Otherwise show normal app
  if (!authChecked) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#10b981,#3b82f6)" }}>
        <div style={{ color:"#fff", fontFamily:"Georgia,serif" }}>
          <div style={{ fontSize:32, textAlign:"center" }}>🥗</div>
          <div style={{ fontSize:13, opacity:.9, marginTop:8 }}>Carregando...</div>
        </div>
      </div>
    );
  }

  // Show auth screen if: never authenticated AND never chose offline, OR user opened it manually
  if ((!session && !skipAuth) || showAuthScreen) {
    return (
      <AuthScreen
        onAuthenticated={handleAuthenticated}
        onSkip={() => { handleSkipAuth(); setShowAuthScreen(false); }}
      />
    );
  }

  // After login, wait for the initial cloud sync before deciding whether to show
  // the Planner or the registration flow. This prevents showing RegisterScreen
  // for users who already have a profile saved in the cloud.
  if (session && !initialSyncDone) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#10b981,#3b82f6)", padding:24 }}>
        <div style={{ color:"#fff", fontFamily:"Georgia,serif", textAlign:"center", maxWidth:320 }}>
          <div style={{ fontSize:48, marginBottom:14, animation:"spin 1.5s linear infinite", display:"inline-block" }}>☁️</div>
          <div style={{ fontSize:17, fontWeight:800, marginBottom:6 }}>Sincronizando seus dados</div>
          <div style={{ fontSize:12, opacity:.9, lineHeight:1.5 }}>
            Estamos baixando seu perfil e progresso do servidor.<br/>Isso leva só alguns segundos...
          </div>
          <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
        </div>
      </div>
    );
  }

  return (
    <div>
      {/* Exit / save prompt */}
      {showExitPrompt && (
        <ExitPrompt
          onSaveAndExit={saveAll}
          onExitWithout={() => { clearProfile(); setProfile(null); setShowExitPrompt(false); }}
          onStay={() => setShowExitPrompt(false)}
        />
      )}

      {/* Sync menu dropdown */}
      {showSyncMenu && (
        <SyncMenu
          session={session}
          status={syncStatus}
          onLogin={handleOpenAuth}
          onLogout={handleLogout}
          onSyncNow={handleSyncNow}
          onClose={() => setShowSyncMenu(false)}
        />
      )}

      {/* Floating sync status badge — top right corner */}
      <div style={{ position:"fixed", top:"calc(env(safe-area-inset-top, 0px) + 10px)", right:14, zIndex:1500 }}>
        <SyncStatusBadge
          status={syncStatus}
          session={session}
          onClick={() => setShowSyncMenu(true)}
        />
      </div>

      {toast && (
        <div style={{
          position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)",
          background:"linear-gradient(135deg,#10b981,#059669)",
          color:"#fff", borderRadius:14, padding:"12px 24px",
          fontSize:13, fontWeight:700, zIndex:9999,
          boxShadow:"0 8px 32px rgba(16,185,129,.45)",
          fontFamily:"Georgia,serif", whiteSpace:"nowrap",
          animation:"slideUp2 .35s ease",
        }}>
          {toast}
        </div>
      )}
      {profile
        ? <Planner profile={profile} onReset={handleReset} onProfileUpdate={(p) => { saveProfile(p); setProfile(p); markUnsaved(); showToast("✓ Perfil atualizado!"); }} markUnsaved={markUnsaved} session={session} onSwitchAccount={session ? handleLogout : handleOpenAuth} />
        : <RegisterScreen onRegister={handleRegister} />
      }
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
